spring.application.name=Climate-Bus-Map-BE

# DB
spring.datasource.url=jdbc:postgresql://localhost:5442/climate_bus_map
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 초기 데이터 (data.sql) 자동 실행 — JPA 초기화 이후에 실행
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# 서울 버스 공공 API
seoul.bus.api.key=${SEOUL_BUS_API_KEY}
seoul.bus.api.base-url=http://ws.bus.go.kr/api/rest

# Cache
spring.cache.type=caffeine

# HTTP 요청 URL 디버그 로깅 (임시)
logging.level.org.springframework.web.client=DEBUG
logging.level.org.springframework.http.client=DEBUG

