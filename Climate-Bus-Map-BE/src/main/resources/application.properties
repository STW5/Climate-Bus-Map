spring.application.name=Climate-Bus-Map-BE

# DB
spring.datasource.url=jdbc:postgresql://localhost:5442/climate_bus_map
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update

# 초기 데이터 (data.sql) 자동 실행 — JPA 초기화 이후에 실행
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=3600
jwt.refresh-token-expiry=604800

# Cookie
app.cookie.secure=${COOKIE_SECURE:false}

# 서울 버스 공공 API
seoul.bus.api.key=${SEOUL_BUS_API_KEY}
seoul.bus.api.base-url=http://ws.bus.go.kr/api/rest

# Cache
spring.cache.type=caffeine

# Web Push (VAPID)
vapid.public-key=${VAPID_PUBLIC_KEY}
vapid.private-key=${VAPID_PRIVATE_KEY}
vapid.subject=mailto:admin@climatego.app
